services:
  postgres:
    image: postgres:16-alpine
    container_name: sead_postgres
    environment:
      POSTGRES_DB: sead_expenses
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sead_expenses"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sead_backend
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.docker
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: sh /var/www/html/docker/start.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sead_frontend
    working_dir: /app
    env_file:
      - ./frontend/.env.docker
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: sh /app/docker/start.sh

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
